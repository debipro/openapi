    ### Prueba de los webhooks en entornos locales

    You can easy create test webhooks using https://webhook.site/ With that you will be able to see what we are sending to our API consumers.

    Also, to start integrating the webhooks, your code will need to be accessible from the internet so Debi can reach it with HTTP requests. If youâ€™re working locally, the easiest way to do this is with [ngrok](https://ngrok.com/).

    ### Asegurando los Webhooks

    Debi signs the webhook events it sends to your endpoints by including a signature in each eventâ€™s Debi-Signature header. This allows you to verify that the events were sent by Debi, not by a third party.

    Before you can verify signatures, you need to retrieve your endpointâ€™s secret _"Secreto webhook"_ from your webhooks in our [developers panel](https://debi.pro/dashboard/developers). Add or select the endpoint you want to obtain the secret for, then click the _"mostrar"_ button.

    Debi generates a unique secret key for each endpoint. If you use the same endpoint for both test and live API keys, note that the secret is different for each one. Additionally, if you use multiple endpoints, you must obtain a secret for each one you want to verify signatures on. After this setup, Debi starts to sign each webhook it sends to the endpoint.

    #### Webhooks authenticity validation steps

    Debi generates signatures using a hash-based message authentication code (HMAC) with SHA-256. To prevent downgrade attacks.

    ##### Step 1: Extract the timestamp and signatures from the header

    Split the header, using the , character as the separator, to get a list of elements. Then split each element, using the = character as the separator, to get a prefix and value pair.

    The value for the prefix t corresponds to the timestamp, and v1 corresponds to the signature (or signatures). You can discard all other elements.

    ##### Step 2: Prepare the signed_payload string

    The signed_payload string is created by concatenating:

    The timestamp (as a string)
    The character .
    The actual JSON payload (that is, the request body)

    ##### Step 3: Determine the expected signature

    Compute an HMAC with the SHA256 hash function. Use the endpointâ€™s signing secret as the key, and use the signed_payload string as the message.

    ##### Step 4: Compare the signatures

    Compare the signature (or signatures) in the header to the expected signature. For an equality match, compute the difference between the current timestamp and the received timestamp, then decide if the difference is within your tolerance.

    To protect against timing attacks, use a constant-time string comparison to compare the expected signature to each of the received signatures.
