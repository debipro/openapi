tags:
  - name: Clientes
    description: |
      Este objeto representa a un cliente de su organizaciĂłn. Le permite crear suscripciones y realizar un seguimiento de los pagos que pertenecen al mismo cliente.

      <SchemaDefinition schemaRef="#/components/schemas/customer" exampleRef="#/components/examples/customer" showReadOnly={true} showWriteOnly={true} />
  - name: Eventos
    description: |
      Los eventos son nuestra forma de avisarte cuando sucede algo interesante en tu cuenta. Cuando ocurre un evento, creamos un nuevo objeto Evento. Por ejemplo, cuando se actualiza un pago, creamos un evento de pago actualizado. Tenga en cuenta que muchas solicitudes de API pueden provocar la creaciĂłn de varios eventos. Por ejemplo, si crea una nueva suscripciĂłn para un cliente, recibirĂˇ un evento creado por la suscripciĂłn del cliente y un evento creado por el pago.

      Los eventos ocurren cuando cambia el estado de otro recurso API. El estado del recurso al momento del cambio estĂˇ embebido en el campo `data` del evento. Por ejemplo, un evento de `payment.updated` contendrĂˇ un pago y un evento `customer.created` contendrĂˇ un cliente.

      <SchemaDefinition schemaRef="#/components/schemas/event" exampleRef="#/components/examples/event" showReadOnly={true} showWriteOnly={true} />
  - name: Informes
    description: |
      Los informes te permiten generar reportes en varios formatos (CSV, Excel) para tus datos. Puedes exportar pagos, clientes y otras entidades con filtros personalizables y rangos de fechas.

      <SchemaDefinition schemaRef="#/components/schemas/export" exampleRef="#/components/examples/export" showReadOnly={true} showWriteOnly={true} />
  - name: Gateways
    description: |
      Un gateway es una instituciĂłn que autoriza y facilita los pagos. Puede ser un procesador de pagos, un banco o una red de tarjetas. En Debi, el objeto gateway representa la configuraciĂłn especĂ­fica y las credenciales que tu empresa utiliza para acceder a cada servicio.

      <SchemaDefinition schemaRef="#/components/schemas/gateway" exampleRef="#/components/examples/gateway" showReadOnly={true} showWriteOnly={true} />
  - name: Importaciones
    description: |
      Una ImportaciĂłn es un objeto que contiene datos para ser creados en Debi. Como estos objetos pueden ser grandes, se crearĂˇn y procesarĂˇn mĂˇs tarde. Puede comprobar el estado de la importaciĂłn.

      <SchemaDefinition schemaRef="#/components/schemas/import" exampleRef="#/components/examples/import" showReadOnly={true} showWriteOnly={true} />
  - name: Links
    description: |
      Un Link es una URL compartible que llevarĂˇ a sus clientes a una pĂˇgina de pago/adhesiĂłn. Los Links pueden crear adhesiones, pagos o suscripciones fĂˇcilmente. Un Link se puede compartir y utilizar varias veces.

      Cuando un cliente abre un Link de pago, el siguiente paso crearĂˇ una nueva SesiĂłn de pago para mostrar la pĂˇgina. Puede utilizar los eventos de la SesiĂłn de pago para realizar un seguimiento de los resultados.

      <SchemaDefinition schemaRef="#/components/schemas/link" exampleRef="#/components/examples/link" showReadOnly={true} showWriteOnly={true} />
  - name: Adhesiones
    description: |
      Una AdhesiĂłn es un registro del permiso que un cliente te ha dado para debitar su mĂ©todo de pago.

      <SchemaDefinition schemaRef="#/components/schemas/mandate" exampleRef="#/components/examples/mandate" showReadOnly={true} showWriteOnly={true} />
  - name: MĂ©todos de Pago
    description: |
      Estos objetos representan los MĂ©todos de Pago de su cliente. Puede usarlos para crear pagos o suscripciones a un cliente.

      <SchemaDefinition schemaRef="#/components/schemas/payment_method" exampleRef="#/components/examples/payment_method" showReadOnly={true} showWriteOnly={true} />
  - name: Pagos
    description: |
      Un pago es un objeto que crea para cargar una tarjeta de crĂ©dito, dĂ©bito o una cuenta bancaria. Puede obtener informaciĂłn sobre el pago y tambiĂ©n reembolsarlos parcial o totalmente.

      |        Estado        |                                          RazĂłn                                          |
      | -------------------- | --------------------------------------------------------------------------------------- |
      | `pending_submission` | El pago se ha emitido, pero aĂşn no se ha presentado a la entidad financiera             |
      | `cancelled`          | El pago ha sido cancelado manualmente.                                                  |
      | `submitted`          | El pago se ha realizado correctamente y estĂˇ siendo procesado por la entidad financiera |
      | `failed`             | No se ha podido presentar en la entidad financiera. Hay un error en la solicitud        |
      | `will_retry`         | El intento fracasĂł, pero la entidad financiera harĂˇ un nuevo intento                    |
      | `approved`           | Enviado OK y aprobado                                                                   |
      | `rejected`           | Se enviĂł correctamente, pero no se pudo cobrar.                                         |
      | `chargeback`         | El cliente le pidiĂł al banco que le devolvieran su dinero.                              |
      | `refunded`           | El pago ha sido devuelto al cliente.                                                    |
      | `partially_refunded` | Una cantidad parcial del pago ha sido devuelta al cliente                               |
      | `requires_action`    | El pago requiere una acciĂłn adicional del cliente                                       |
      | `incomplete`         | El pago estĂˇ incompleto y esperando informaciĂłn adicional (MĂ©todo de Pago)              |

      <SchemaDefinition schemaRef="#/components/schemas/payment" exampleRef="#/components/examples/payment" showReadOnly={true} showWriteOnly={true} />
  - name: Devoluciones
    description: |
      Los objetos de devoluciones le permiten reembolsar un pago que se ha creado anteriormente pero que aĂşn no se ha reembolsado por completo. Los fondos se reembolsarĂˇn a la tarjeta de crĂ©dito, dĂ©bito o cuenta bancaria que se cargĂł originalmente.

      |        Estado        |                                             RazĂłn                                              |
      | -------------------- | ---------------------------------------------------------------------------------------------- |
      | `pending_submission` | Se ha emitido la devoluciĂłn, pero aĂşn no se ha presentado a la entidad financiera              |
      | `submitted`          | La devoluciĂłn se ha presentado correctamente y estĂˇ siendo tramitada por la entidad financiera |
      | `failed`             | Enviado OK pero rechazado por la entidad financiera                                            |
      | `approved`           | Enviado OK y aprobado                                                                          |

      <SchemaDefinition schemaRef="#/components/schemas/refund" exampleRef="#/components/examples/refund" showReadOnly={true} showWriteOnly={true} />
  - name: Sesiones
    description: |
      Las sesiones te permiten utilizar las pĂˇginas de pago alojadas de Debi para configurar adhesiones, suscripciones o pagos con tus clientes.

      Primero, crea una sesiĂłn para su cliente y los redirige a la URL de redirecciĂłn devuelta. Su adhiriente proporciona su nombre, correo electrĂłnico, direcciĂłn y detalles de la cuenta bancaria o de la tarjeta, y envĂ­a el formulario. Esto almacena de forma segura sus detalles y los redirige a su `back_url` con `session_id=THE_SESSION_ID` en la cadena de consulta.

      Completada la sesiĂłn, se crea un cliente, un mĂ©todo de pago y un pago, una adhesiĂłn o una suscripciĂłn, y devuelve el ID de la sesiĂłn. Con estos datos es posible que desee crear una suscripciĂłn o pago en este momento.

      Una vez que haya completado la sesiĂłn a travĂ©s de la API, debe mostrar una pĂˇgina de confirmaciĂłn a su cliente, confirmando que se han completado todos los datos. Puede crear su propia pĂˇgina o redirigir a la que proporcionamos en el atributo `confirm_url` de la sesiĂłn.

      La sesiĂłn expira despuĂ©s de completarse. No puede completar una sesiĂłn vencida o ya completada.

      <SchemaDefinition schemaRef="#/components/schemas/session" exampleRef="#/components/examples/session" showReadOnly={true} showWriteOnly={true} />
  - name: Suscripciones
    description: |
      Las suscripciones permiten cobrar a un cliente de forma recurrente de acuerdo con un cronograma.

      |    Estado    |                                       RazĂłn                                        |
      | ------------ | ---------------------------------------------------------------------------------- |
      | `active`     | La suscripciĂłn estĂˇ activa y generando pagos.                                      |
      | `paused`     | La suscripciĂłn se ha pausado manualmente y no generarĂˇ pagos hasta que se reanude. |
      | `cancelled`  | La suscripciĂłn se ha cancelado manualmente.                                        |
      | `finished`   | La suscripciĂłn estĂˇ completa: todos los pagos se crearon con Ă©xito.                |
      | `incomplete` | La suscripciĂłn estĂˇ incompleta y esperando informaciĂłn adicional.                  |


      <SchemaDefinition schemaRef="#/components/schemas/subscription" exampleRef="#/components/examples/subscription" showReadOnly={true} showWriteOnly={true} />
  - name: Webhooks
    description: |
      Los webhooks son URLs que puedes configurar para recibir notificaciones sobre eventos que suceden en tu cuenta de Debi. La mayorĂ­a de los usuarios configuran los webhooks desde el panel, que proporciona una interfaz de usuario para registrar y probar los puntos finales de su webhook.

      <SchemaDefinition schemaRef="#/components/schemas/webhook" exampleRef="#/components/examples/webhook" showReadOnly={true} showWriteOnly={true} />
