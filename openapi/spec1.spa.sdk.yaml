  description: |
    # IntroducciĂłn

    Debi (anteriormente TuCuota) tiene una API REST. Nuestra API tiene direcciones URL predecibles orientadas a los recursos, acepta solicitudes JSON, devuelve respuestas JSON y utiliza cĂłdigos de respuesta, autenticaciĂłn y verbos HTTP estĂˇndar.

    Las URLs de la API de Debi API son:

    - ProducciĂłn: https://api.debi.pro/
    - Sandbox: https://api.debi-test.pro/

    ### Content type

    La API de Debi sĂłlo soporta `JSON`. No te olvides de incluir el siguiente header en tus requests.

    #### Content-Type Header

    ```
    Content-Type: "application/json"
    ```
    # AutenticaciĂłn

    La API solo estĂˇ disponible a travĂ©s de HTTPS. Intentar acceder a la API a travĂ©s de una conexiĂłn HTTP no segura devolverĂˇ un error `tls_required`.

    ### Crear una clave API

    Para crear nuevas claves API, visite la [secciĂłn de desarrolladores](https://debi.pro/dashboard/developers) de nuestro sitio.

    Para cada entorno (producciĂłn y sandbox), encontrarĂˇ dos tipos de claves de API:

    - PĂşblica (`pk_...`): puede aparecer en su cĂłdigo del lado del cliente para tokenizar los mĂ©todos de pago.
    - Secreta (`sk_...`): Para ser utilizado en el lado del servidor. Debe ser secreto y almacenarse de forma segura en el cĂłdigo de su aplicaciĂłn para comunicarse con la API de Debi.

    Para autenticarse, debe utilizar la clave de API en un Header del request HTTP al realizar solicitudes en la API.

    ### Example Authentication Header

    ```
    Authorization: Bearer sk_live_...
    ```

    Todas las solicitudes de API deben realizarse a travĂ©s de HTTPS. Las llamadas realizadas a travĂ©s de HTTP fallarĂˇn. Las solicitudes de API sin autenticaciĂłn tambiĂ©n fallarĂˇn.
    # Errores

    This API uses HTTP status codes to communicate with the API consumer.

    - `200 OK` - Response to a successful GET, PUT, PATCH or DELETE.
    - `201 Created` - Response to a POST that results in a creation.
    - `204 No Content` - Response to a successful request that won't be returning a body (like a DELETE request).
    - `400 Bad Request` - Malformed request.
    - `401 Unauthorized` - When no or invalid authentication details are provided.
    - `403 Forbidden` - When authentication succeeded but authenticated user doesn't have access to the resource.
    - `404 Not Found` - When a non-existent resource is requested.
    - `405 Method Not Allowed` - Method not allowed.
    - `406 Not Acceptable` - Could not satisfy the request Accept header.
    - `415 Unsupported Media Type` - Unsupported media type in request.
    - `422 Unprocessable Entity` - Form validation errors.

    #### Respuestas de Error

    Esta API devuelve cĂłdigos de error legibles por mĂˇquina y mensajes de error legibles por humanos cuando hay un error.

    ##### Ejemplos

    ###### Error de ValidaciĂłn

    ```json
    {
        "message": "The given data was invalid.",
        "errors": {
            "organization_name": ["El campo debe tener algĂşn valor."],
            "mobile_number": ["El campo debe tener algĂşn valor."],
            "province": ["El campo debe tener algĂşn valor."],
            "locality": ["El campo debe tener algĂşn valor."],
            "address": ["El campo debe tener algĂşn valor."]
        }
    }
    ```

    ###### Error GenĂ©rico

    ```json
    {
        "message": "Unauthenticated."
    }
    ```
    # Idempotencia

    La API admite la idempotencia para volver a intentar solicitudes de forma segura sin realizar accidentalmente la misma operaciĂłn dos veces. Esto es Ăştil cuando una llamada API se interrumpe en trĂˇnsito y no recibe una respuesta. Por ejemplo, si una solicitud para crear un pago no responde debido a un error de conexiĂłn a la red, puede volver a intentar la solicitud con la misma clave de idempotencia para garantizar que no se cree mĂˇs de un cargo.

    Para realizar una solicitud idempotente, envĂ­a un encabezado `Idempotency-Key: <key>` adicional en la llamada HTTP.

    La idempotencia funciona guardando el cĂłdigo de estado y el contenido de la primera solicitud realizada para cualquier clave de idempotencia dada, independientemente de si tuvo Ă©xito o no. Las solicitudes posteriores con la misma clave devuelven el mismo resultado, incluidos los errores 500.

    Una clave de idempotencia es un valor Ăşnico generado por el cliente que el servidor utiliza para reconocer reintentos posteriores de la misma solicitud. La forma en que crea claves Ăşnicas depende de usted, pero sugerimos usar UUID V4 u otra cadena aleatoria con suficiente entropĂ­a para evitar colisiones.

    Las claves son elegibles para eliminarse del sistema despuĂ©s de que tengan al menos 24 horas de antigĂĽedad, y se genera una nueva solicitud si una clave se reutiliza despuĂ©s de que se eliminĂł la original. La capa de idempotencia compara los parĂˇmetros entrantes con los de la solicitud original y los errores a menos que sean los mismos para evitar el uso indebido accidental.

    Los resultados solo se guardan si un extremo de la API comenzĂł a ejecutarse. Si los parĂˇmetros entrantes fallaron en la validaciĂłn o la solicitud entrĂł en conflicto con otra que se estaba ejecutando al mismo tiempo, no se guarda ningĂşn resultado idempotente porque ningĂşn extremo de la API comenzĂł a ejecutarse. Es seguro volver a intentar estas solicitudes.

    Todas las solicitudes `POST` aceptan claves de idempotencia. El envĂ­o de claves de idempotencia en solicitudes `GET` y `DELETE` no tiene ningĂşn efecto y debe evitarse, ya que estas solicitudes son idempotentes por definiciĂłn.
    # Metadata

    Los siguientes objetos tienen un parĂˇmetro `metadata` que puedes usar para guardar pares de clave-valor:

    - [Clientes](#tag/Clientes)
    - [Adhesiones](#tag/Adhesiones)
    - [Pagos](#tag/Pagos)
    - [Devoluciones](#tag/Devoluciones)
    - [MĂ©todos de Pago](#tag/Metodos-de-Pago)
    - [Suscripciones](#tag/Suscripciones)

    La metadata es Ăştil para almacenar informaciĂłn estructurada adicional sobre un objeto.

    No almacene informaciĂłn confidencial (nĂşmeros de cuentas bancarias, detalles de tarjetas, etc.) como metadata.
    # PaginaciĂłn

    Todos los recursos de la API pueden listarse a travĂ©s de mĂ©todos de la API. Por ejemplo, puede [obtener pagos](#tag/Pagos/operation/PaymentsGetPayments), [obtener clientes](#tag/Clientes/operation/CustomersGetCustomers) y [obtener suscripciones](#tag/Suscripciones/operation/SubscriptionsGetSubscriptions). Estos mĂ©todos API de lista comparten una estructura comĂşn, tomando al menos estos tres parĂˇmetros: `limit`, `starting_after` y `ending_before`.

    La respuesta de un mĂ©todo API de lista representa una sola pĂˇgina en un orden cronolĂłgico inverso. Si no especificas `starting_after` o `ending_before`, recibirĂˇs la primera pĂˇgina de este objecto, que contiene los objetos mĂˇs nuevos. Puede especificar un ID en el campo `starting_after` para obtener la pĂˇgina de objetos mĂˇs antiguos que aparecen inmediatamente despuĂ©s del objeto en cuestiĂłn. De manera similar, puedes especificar `ending_before` para recibir una pĂˇgina de objetos mĂˇs nuevos que ocurren inmediatamente antes del objeto en cuestiĂłn. Los objetos de una pĂˇgina siempre aparecen en orden cronolĂłgico inverso. Solo se puede usar `starting_after` o `ending_before`.
    # IDs de Request

    Cada request a la API tiene un identificador de request asociado. Puede encontrar este valor en el header `Request-Id`. TambiĂ©n puede encontrar estos IDs en logs de requests en su [Panel](https://debi.pro/dashboard/logs).
    # Convenciones

    ### Notational Conventions

    The key words "MUST", "MUST NOT", "REQUIRED", "SHALL", "SHALL NOT", "SHOULD", "SHOULD NOT", "RECOMMENDED", "MAY", and "OPTIONAL" in this document are to be interpreted as described in [RFC2119](https://www.ietf.org/rfc/rfc2119).

    ### HTTP Methods

    This API uses HTTP verbs (methods) as following:

    - `GET` - _Read_ - used to **read** (or retrieve) a representation of a resource,
    - `POST` - _Create_ - used to **create** new resources. In particular, it's used to create subordinate resources.
    - `PUT` - _Update/Replace_ - used for **update** capabilities, PUT-ing to a known resource URI with the request body containing the newly-updated representation of the original resource. On successful request, replaces identified resource with the request body.
    - `PATCH` - _Update/Modify_ - used for **modify** capabilities. The PATCH request only needs to contain the changes to the resource, not the complete resource.
    - `DELETE` - _Delete_ - used to **delete** a resource identified by a URI.

    ### Representation of Date and Time

    All exchange of date and time-related data MUST be done according to [RFC339 standard](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8).

    ### Versioning

    This API uses `Api-Version` header to identify requested version. Every **minor** version SHOULD be backward compatible. However, **major** versions MAY introduce _breaking changes_.

    `Api-Version: `

    This header SHOULD be present in every request. If not, API MUST use the newest available major release.

    If requested version is not available, API SHOULD try to fall back to the next available minor release.

    When backwards-incompatible changes are made to the API, a new, dated version is released. The current version of the API is `2022-02-14`.

    ### Resource IDs

    This API uses short non-sequential url-friendly unique ids. Every resource id MUST consists of 12 url-friendly characters: `A-Z`, `a-z`, `0-9`, `_` and `-`.

    #### Example

    `PY6b3Rr6nRMo`
