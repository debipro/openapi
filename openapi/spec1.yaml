    post:
      operationId: PaymentsCreatePayment
      summary: Create a payment
      description: Create a payment.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:
                  description: The amount of the payment.
                  type: number
                description:
                  description: The description of the payment.
                  type: string
                customer_id:
                  description: |
                    [Customer ID](#tag/Customers).
                  type: string
                  example: CSgaZlLaPMZO.
                payment_method_id:
                  description: |
                    The [Payment Method ID](#tag/Payment-Methods) for this payment. If you don't send this parameter, the payment will be collected using the default payment method for the customer. If the customer doesn't have a default payment method, the payment will stay in status `incomplete`, until it is updated via session, billing portal, or API.
                  type: string
                  example: PMBja4YZ2GDR.
                charge_date:
                  description: A future or present date on which the payment should be collected (Should be today or a future date). If not specified, the payment will be collected as soon as possible.
                  type: string
                  format: date
                can_auto_retry_until:
                  description: The maximum date the payment could be retried automatically. If null, will apply the default value for the user.
                  type: string
                  format: date
                auto_retries_max_attempts:
                  description: The maximum amount of times the payment could be retried automatically. If null, will apply the default value for the user.
                  type: integer
                binary_mode:
                  description: |
                    Binary mode forces instantaneous payment processing, returning an immediate and definitive status — either approved or rejected — within the same request response.
                    This mode prevents inconclusive responses (such as payments with status `submitted`) by using only gateways that can process payments instantly, ensuring a fast and conclusive outcome.
                    It is particularly useful when processing payments in a checkout flow that requires a synchronous response, allowing the customer to receive instant feedback on the transaction result. Also consider that this mode disables automatic retries for rejected payments, but this behavior can be managed also defining the maximum amount of times the payment could be retried automatically by setting the `auto_retries_max_attempts` parameter.
                  type: boolean
                  example: true
                metadata:
                  description: |
                    Set of [key-value pairs](#section/Metadata) that you can attach
                    to an object. This can be useful for storing additional
                    information about the object in a structured format.
                    All keys can be unset by posting `null` value to `metadata`.
                  type:
                    - object
                    - 'null'
                  example:
                    some: metadata
                  additionalProperties:
                    maxLength: 500
                    type:
                      - string
                      - 'null'
                      - number
                      - boolean
                  properties: {}
              example:
                amount: 100
                description: Unique payment
                customer_id: CSr7Dg3LkDP2
                payment_method_id: PMBja4YZ2GDR
              required:
                - amount
                - description
                - customer_id
