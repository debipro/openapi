paths:
  /v1/billing_portal/configurations:
    get:
      operationId: BillingPortalConfigurationsList
      summary: List all Billing Portal Configurations
      description: |
        Returns a list of Billing Portal Configurations for the account. By default, all configurations
        are returned, newest first. Use the `active` and `is_default` filters to narrow the result.
      parameters:
        - name: active
          in: query
          description: When `true`, only active configurations are returned.
          required: false
          schema:
            type: boolean
        - name: is_default
          in: query
          description: When `true`, only the default configuration of the account is returned.
          required: false
          schema:
            type: boolean
        - name: created_at
          in: query
          description: A filter on the list, based on the object `created_at` field. The value can be a string with an integer Unix timestamp, or it can be a dictionary with a number of different query options.
          required: false
          schema:
            type: object
            properties:
              gt:
                description: Minimum value to filter by (exclusive)
                type: integer
              gte:
                description: Minimum value to filter by (inclusive)
                type: integer
              lt:
                description: Maximum value to filter by (exclusive)
                type: integer
              lte:
                description: Maximum value to filter by (inclusive)
                type: integer
            title: range_query_specs
          explode: true
          style: deepObject
        - name: ending_before
          in: query
          description: A cursor for use in pagination. `ending_before` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, starting with `obj_bar`, your subsequent call can include `ending_before=obj_bar` in order to fetch the previous page of the list.
          required: false
          schema:
            type: string
          style: form
        - name: limit
          in: query
          description: A limit on the number of objects to be returned. Limit can range between 1 and 100, and the default is 25.
          required: false
          schema:
            type: integer
          example: 20
        - name: starting_after
          in: query
          description: A cursor for use in pagination. `starting_after` is an object ID that defines your place in the list. For instance, if you make a list request and receive 100 objects, ending with `obj_foo`, your subsequent call can include `starting_after=obj_foo` in order to fetch the next page of the list.
          required: false
          schema:
            type: string
          style: form
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      title: Billing Portal Configuration
                      description: |-
                        A Billing Portal Configuration describes the functionality and appearance of a billing portal session.
                        You can have multiple configurations and pick the one to use when creating a Billing Portal Session.
                      type: object
                      properties:
                        id:
                          description: Unique identifier for the Billing Portal Configuration.
                          type: string
                          example: BPCqXz3a8YbE
                          readOnly: true
                        object:
                          type: string
                          enum:
                            - billing_portal.configuration
                        active:
                          description: Whether the configuration is active and can be used to create sessions.
                          type: boolean
                          example: true
                        is_default:
                          description: Whether this is the default configuration for the account. The first configuration created becomes the default automatically.
                          type: boolean
                          example: true
                        business_profile:
                          description: The business information shown to the customer in the portal.
                          type:
                            - object
                            - 'null'
                          properties:
                            headline:
                              description: A short headline displayed at the top of the portal.
                              type:
                                - string
                                - 'null'
                              example: Manage your subscription
                            privacy_policy_url:
                              description: URL to your privacy policy.
                              type:
                                - string
                                - 'null'
                              example: https://example.com/privacy
                            terms_of_service_url:
                              description: URL to your terms of service.
                              type:
                                - string
                                - 'null'
                              example: https://example.com/terms
                        features:
                          description: The features enabled in the portal for the customer.
                          type: object
                          properties:
                            customer_update:
                              description: Allow the customer to update their personal information.
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                  example: false
                            invoice_history:
                              description: Allow the customer to view their payment history.
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                  example: true
                            payment_method_update:
                              description: Allow the customer to add, remove and choose default payment methods.
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                  example: true
                            subscription_cancel:
                              description: Allow the customer to cancel their subscriptions.
                              type: object
                              properties:
                                enabled:
                                  type: boolean
                                  example: true
                        login_page:
                          description: Configuration of the login page that allows customers to access the portal with their email.
                          type: object
                          properties:
                            enabled:
                              description: Whether the standalone login page is enabled.
                              type: boolean
                              example: true
                            url:
                              description: Public URL of the login page when enabled.
                              type:
                                - string
                                - 'null'
                              example: https://billing.debi.pro/login/acme
                              readOnly: true
                        default_return_url:
                          description: |
                            Default URL the customer is redirected to after they are done managing their billing. Can
                            be overridden on a per-session basis when creating a Billing Portal Session.
                          type:
                            - string
                            - 'null'
                          example: https://example.com/account
                        payment_method_types:
                          description: |
                            Subset of payment method types the customer can use inside the portal. If `null` all
                            configured payment methods of the account will be available.
                          allOf:
                            - type: array
                              items:
                                type: string
                                enum:
                                  - card
                                  - cbu
                                  - cvu
                                  - sepa_debit
                                  - transfer
                              description: |
                                Array of payment method types to allow. If not specified, all available payment methods will be allowed.
                              example:
                                - card
                                - cbu
                                - cvu
                        payment_method_options:
                          description: Fine-grained configuration for each payment method type (e.g. allowed card networks).
                          allOf:
                            - type: object
                              description: |
                                Configuration options for specific payment method types, such as disallowing certain card networks or funding types.
                              properties:
                                card:
                                  type: object
                                  properties:
                                    disallow:
                                      type: object
                                      properties:
                                        funding:
                                          description: Funding types to disallow
                                          type: array
                                          items:
                                            type: string
                                            enum:
                                              - credit
                                              - debit
                                              - prepaid
                                              - unknown
                                          example:
                                            - prepaid
                                        network:
                                          description: Card networks to disallow
                                          type: array
                                          items:
                                            type: string
                                            enum:
                                              - amex
                                              - diners
                                              - discover
                                              - favacard
                                              - jcb
                                              - mastercard
                                              - naranja
                                              - unknown
                                              - visa
                                          example:
                                            - amex
                              example:
                                card:
                                  disallow:
                                    funding:
                                      - prepaid
                                    network:
                                      - amex
                        supported_payment_methods:
                          description: |
                            Computed payment methods that are actually available given the account's gateways
                            and the restrictions defined in `payment_method_types` and `payment_method_options`.
                          type: object
                          example:
                            card:
                              networks:
                                - diners
                                - jcb
                                - mastercard
                                - visa
                              required_fields: []
                            cbu: true
                          readOnly: true
                        metadata:
                          description: |
                            Set of [key-value pairs](#section/Metadata) that you can attach
                            to an object. This can be useful for storing additional
                            information about the object in a structured format.
                            All keys can be unset by posting `null` value to `metadata`.
                          type:
                            - object
                            - 'null'
                          example:
                            some: metadata
                          additionalProperties:
                            maxLength: 500
                            type:
                              - string
                              - 'null'
                              - number
                              - boolean
                          properties: {}
                        livemode:
                          description: Has the value `true` if the object exists in live mode or the value `false` if the object exists in test mode.
                          type: boolean
                          example: true
                        created_at:
                          description: 'Time at which the object was created. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
                          type: string
                          format: date-time
                          example: 2022-02-11T23:19:22-03:00
                        updated_at:
                          description: 'Time at which the object was last updated. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
                          type: string
                          format: date-time
