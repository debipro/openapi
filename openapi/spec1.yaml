    post:
      operationId: PaymentMethodsCreatePaymentMethod
      summary: Create a payment method (for validation,classification, identification or future use on payments)
      description: |
        Creating a payment method allows you to tokenize the payment method, validate that it meets validation rules, and use it in future payments. It also allows us to classify it based on its properties to make business decisions.

        Additionally, for payment method type `cbu`, adding the identification parameter with the value `true`, we can identify the bank account to determine its owners, or send an alias to determine its corresponding CBU and its owners. In the case of business accounts, the object created will contain an array with the corresponding co-owners. If you send an `alias` parameter in the payload, you don't need to indicate the CBU number, and as a response you will receive the CBU corresponding to that alias.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  description: One of `card`, `sepa_debit`, `cbu`, `cvu`, or `transfer`.
                  type: string
                  enum:
                    - card
                    - sepa_debit
                    - cbu
                    - cvu
                    - transfer
                card:
                  description: This object represents a card of your account.
                  type: object
                  properties:
                    number:
                      description: Card number.
                      type: string
                    expiration_year:
                      description: Card expiration year.
                      type: number
                    expiration_month:
                      description: Card expiration month.
                      type: number
                    security_code:
                      description: Card security code. It is highly recommended to always include this value.
                      type: string
                  title: Card
                cbu:
                  description: This object represents a CBU bank account of your account.
                  type: object
                  properties:
                    number:
                      description: |
                        Bank account number called `CBU` in Argentina (22 digits). If `identification` is `true`, requires sending the `secret key` in the header of the request, otherwise with public key is enough (useful when creating payment methods from the browser). `Required` if you don't send an `alias` in the payload. If you send the `alias` in the POST and the identification is `true`, you don't need to indicate the `cbu` number, and as a response you will receive the `cbu` number corresponding to that `alias`.
                      type: string
                    alias:
                      description: Requires sending the `secret key` in the header of the request. Bank account `alias` that you want to identify. If you send the `alias` in the POST and the parameter `identification` is `true`, it will return the corresponding `cbu`number. Available upon request, contact Support.
                      type: string
                      example: juanperez
                    identification:
                      description: Requires sending the `secret key` in the header of the request. Enhanced bank account identification, when sending in the POST, it will perform the identification, returning in this parameter the owners or co-owners of the account. Also if you send an `alias` in the payload, you don't need to indicate the `cbu` number, and as a response you will receive the CBU corresponding to that alias. Available upon request, contact Support.
                      type: boolean
                  title: CBU
                sepa_debit:
                  description: This object represents a direct debit to a IBAN account for the SEPA Region.
                  type: object
                  properties:
                    iban:
                      description: International Bank account code IBAN
                      type: string
                  title: Sepa Debit (Iban)
                cvu:
                  description: This object represents a CVU (Clave Virtual Uniforme) account.
                  type: object
                  properties: {}
                  title: CVU
                transfer:
                  description: This object represents a bank transfer payment method.
                  type: object
                  properties:
                    sender_name:
                      description: Name of the person or entity making the transfer.
                      type: string
                    sender_id:
                      description: Identification number of the person or entity making the transfer.
                      type: string
                  title: Transfer
                strict:
                  description: If true, the payment_method won't be created if the account doesn't have an available gateway to process this type of payment_method.
                  type: boolean
            examples:
              card-basic:
                summary: Card - Basic
                value:
                  type: card
                  card:
                    number: '4242424242424242'
              card-complete:
                summary: Card - Complete with Expiration and Security Code
                value:
                  type: card
                  card:
                    number: '4242424242424242'
                    expiration_year: 2035
                    expiration_month: 12
                    security_code: '123'
