    put:
      operationId: SubscriptionsUpdateSubscription
      summary: Update a subscription
      description: Update a subscription.
      parameters:
        - name: id
          in: path
          description: Subscription ID.
          required: true
          schema:
            type: string
          example: SBmX1MrZ77Mwq3
      requestBody:
        required: false
        content:
          application/json:
            encoding:
              metadata:
                explode: true
                style: deepObject
            schema:
              type: object
              properties:
                amount:
                  description: |
                    The amount of each payment of the subscription.
                  type: number
                description:
                  description: |
                    The title of each payment of the subscription.
                  type: string
                  maxLength: 255
                count:
                  description: |
                    The total number of payments that should be taken by this subscription. If not specified the
                    subscription will continue until you cancel it.
                  type: number
                customer_id:
                  description: |
                    [Customer ID](#tag/Customers).
                  type: string
                  example: CSgaZlLaPMZO
                payment_method_id:
                  description: |
                    The [Payment Method ID](#tag/Payment-Methods) for each payment of the
                    subscription. This field is required if `payment_method_number` is not given.
                  type: string
                  example: PMBja4YZ2GDR.
                start_date:
                  description: A future date on which the first payment of the subscription should be collected. If not specified, the first payment will be collected as soon as possible.
                  type: string
                interval_unit:
                  description: The unit of time between customer charge dates. One of weekly, monthly or yearly. Example monthly
                  type: string
                interval:
                  description: Number of interval_units between customer charge dates. Must be greater than to 1. If interval_unit is weekly and interval is 2, then the customer will be charged every two weeks. Defaults to 1. Example 1
                  type: number
                day_of_month:
                  description: Day of month, from 1 to 31, or -1 for the last day of the month. This field is required if interval_unit is set to monthly. Defaults to 1. If the chosen day doesn't exist in a given month (e.g. 30 or 31 in February), the payment is charged on the last day of that month.
                  type: number
                day_of_week:
                  description: Day of week number, from 0 (Sunday) to 6 (Saturday). This field is required if `interval_unit` is set to `weekly`.
                  type: number
                auto_retries_max_attempts:
                  description: The maximum number of times the payments from this subscription could be automatically retried.
                  type:
                    - 'null'
                    - number
                  example: null
                metadata:
                  description: |
                    Set of [key-value pairs](#section/Metadata) that you can attach
                    to an object. This can be useful for storing additional
                    information about the object in a structured format.
                    All keys can be unset by posting `null` value to `metadata`.
                  type:
                    - object
                    - 'null'
                  example:
                    some: metadata
                  additionalProperties:
                    maxLength: 500
                    type:
                      - string
                      - 'null'
                      - number
                      - boolean
                  properties: {}
              example:
                amount: 100
                description: Some subscription description
                customer_id: CS9PL8eeo8aB
                payment_method_id: PMBja4YZ2GDR
                interval_unit: monthly
                day_of_month: 1
                metadata:
                  some: metadata
