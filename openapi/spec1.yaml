  securitySchemes:
    PublishableKeyAuthentication:
      type: apiKey
      in: query
      name: key
      description: |
        Authentication using the [publishable key](#section/Authentication). You should send the [Publishable API](#section/Authentication) key in the `key` field of your JSON payload. For Javascript flows.
    SecretKeyAuthentication:
      bearerFormat: auth-scheme
      scheme: bearer
      type: http
      description: |
        Authentication using the [secret key](#section/Authentication). You should send the [Secret API](#section/Authentication) key in the `Authorization` header using the [Bearer](https://tools.ietf.org/html/rfc6750#section-2.1) authentication scheme.
tags:
  - name: Billing Portal Configurations
    description: |
      A Billing Portal Configuration describes the functionality and appearance of a billing portal
      session. You can have multiple configurations and pick which one to use when creating a
      Billing Portal Session. The first configuration created on the account is set as the default
      automatically.

      The billing portal feature must be enabled on your account. Contact Debi support if you get
      a `404` response on these endpoints.

      <SchemaDefinition schemaRef="#/components/schemas/billing_portal_configuration" exampleRef="#/components/examples/billing_portal_configuration" showReadOnly={true} showWriteOnly={true} />
  - name: Billing Portal Sessions
    description: |
      A Billing Portal Session is the hosted page your customers use to manage their billing
      details (payment methods, subscriptions, payment history). To start the flow, create a
      session for a specific customer and redirect them to the returned `url`.

      <SchemaDefinition schemaRef="#/components/schemas/billing_portal_session" exampleRef="#/components/examples/billing_portal_session" showReadOnly={true} showWriteOnly={true} />
  - name: Customers
    description: |
      This object represents a customer of your organization. It lets you create subscriptions and track payments that belong to the same customer.

      <SchemaDefinition schemaRef="#/components/schemas/customer" exampleRef="#/components/examples/customer" showReadOnly={true} showWriteOnly={true} />
  - name: Events
    description: |
      Events are our way of letting you know when something interesting happens in your account. When an interesting event occurs, we create a new Event object. For example, when a payment updates, we create a payment.updated event. Note that many API requests may cause multiple events to be created. For example, if you create a new subscription for a customer, you will receive both a customer.subscription.created event and a payment.created event.

      Los eventos ocurren cuando cambia el estado de otro recurso API. El estado del recurso al momento del cambio está embebido en el campo `data` del evento. Por ejemplo, un evento de `payment.updated` contendrá un pago y un evento `customer.created` contendrá un cliente.

      <SchemaDefinition schemaRef="#/components/schemas/event" exampleRef="#/components/examples/event" showReadOnly={true} showWriteOnly={true} />
  - name: Exports
    description: |
      Exports allow you to generate reports in various formats (CSV, Excel) for your data. You can export payments, customers, and other entities with customizable filters and date ranges.

      <SchemaDefinition schemaRef="#/components/schemas/export" exampleRef="#/components/examples/export" showReadOnly={true} showWriteOnly={true} />
  - name: Gateways
    description: |
      A gateway is a institution that authorizes and facilitates payments. It can be a payment processor, a bank, or a card network. In Debi, the gateway object represents the specific configuration and credentials that your company uses to access each service.

      <SchemaDefinition schemaRef="#/components/schemas/gateway" exampleRef="#/components/examples/gateway" showReadOnly={true} showWriteOnly={true} />
  - name: Imports
    description: |
      An Import is an object which contains data to be created in Debi. As these objects may be big, they will be created and processed later. You can check the status of the import.

      <SchemaDefinition schemaRef="#/components/schemas/import" exampleRef="#/components/examples/import" showReadOnly={true} showWriteOnly={true} />
  - name: Links
    description: |
      A link is a shareable URL that will take your customers to a hosted page. Links can create mandates, payments, or subscription easily. A link can be shared and used multiple times.

      When a customer opens a payment link, the next step will create a new checkout session to render the page. You can use checkout session events to track the results.

      <SchemaDefinition schemaRef="#/components/schemas/link" exampleRef="#/components/examples/link" showReadOnly={true} showWriteOnly={true} />
  - name: Mandates
    description: |
      A Mandate is a record of the permission a customer has given you to debit their payment method.

      <SchemaDefinition schemaRef="#/components/schemas/mandate" exampleRef="#/components/examples/mandate" showReadOnly={true} showWriteOnly={true} />
  - name: Payment Methods
    description: |
      PaymentMethod objects represent your customer's payment instruments. You can use them with to create Payments or Subscriptions to a Customer. Also you can create them for tokenization, validation, classification, identification or future use on payments.

      <SchemaDefinition schemaRef="#/components/schemas/payment_method" exampleRef="#/components/examples/payment_method" showReadOnly={true} showWriteOnly={true} />
  - name: Payments
    description: |
      A Payment is an object you create to charge a credit, debit card, or bank account. You can retrieve information about the payment and also refund them partially or totally.

      |        Status        |                                      Meaning                                       |
      | -------------------- | ---------------------------------------------------------------------------------- |
      | `pending_submission` | The payment has been issued, but still not submitted to the finnancial entity      |
      | `cancelled`          | The payment has been manually cancelled                                            |
      | `submitted`          | The payment is succesfully submitted and being processing by the finnancial entity |
      | `failed`             | Couldn't be submitted to the finnancial entity. There is an error in the request   |
      | `will_retry`         | The attempt failed, but the finnancial entity will make a new attempt              |
      | `approved`           | Submitted OK and approved                                                          |
      | `rejected`           | Submitted OK but couldn't make the collection                                      |
      | `chargeback`         | The customer asked the bank to get them their money back                           |
      | `refunded`           | The payment has been returned to the customer                                      |
      | `partially_refunded` | A partial amount of the payment has been returned to the customer                  |
      | `requires_action`    | The payment requires additional action from the customer                           |
      | `incomplete`         | The payment is incomplete and waiting for additional information (Payment Method)  |

      <SchemaDefinition schemaRef="#/components/schemas/payment" exampleRef="#/components/examples/payment" showReadOnly={true} showWriteOnly={true} />
  - name: Refunds
    description: |
      Refund objects allow you to refund a payment that has previously been created but not yet totally refunded. Funds will be refunded to the credit, debit card, or bank account that was originally charged.

      |        Status        |                                      Meaning                                      |
      | -------------------- | --------------------------------------------------------------------------------- |
      | `pending_submission` | The refund has been issued, but still not submitted to the finnancial entity      |
      | `submitted`          | The refund is succesfully submitted and being processing by the finnancial entity |
      | `failed`             | Submitted OK but rejected by the finnancial entity                                |
      | `approved`           | Submitted OK and approved                                                         |

      <SchemaDefinition schemaRef="#/components/schemas/refund" exampleRef="#/components/examples/refund" showReadOnly={true} showWriteOnly={true} />
  - name: Sessions
    description: |
      Sessions enable you to use Debi's hosted payment pages to set up mandates, subscriptions or payments with your customers.

      First you create a Session for your customer, and redirect them to the returned redirect url. Your customer supplies their name, email, address, and bank account or card details, and submits the form. This securely stores their details, and redirects them back to your `back_url` with `session_id=THE_SESSION_ID` in the querystring.

      You complete the Session, which creates a customer, payment method, and either payment, mandate or subscription, and returns the ID of the session. With this data you may wish to create a subscription or payment at this point.

      Once you have completed the Session via the API, you should display a confirmation page to your customer, confirming that data has been set up. You can build your own page, or redirect to the one we provide in the `confirmation_url` attribute of the Session.

      Session expire after completed. You cannot complete an expired or already completed Session.

      <SchemaDefinition schemaRef="#/components/schemas/session" exampleRef="#/components/examples/session" showReadOnly={true} showWriteOnly={true} />
  - name: Subscriptions
    description: |
      Subscriptions allow you to charge a customer on a recurring basis according to a schedule.

      |    Status    |                                         Meaning                                          |
      | ------------ | ---------------------------------------------------------------------------------------- |
      | `active`     | The subscription is active and generating payments.                                      |
      | `paused`     | The subscription have been manually paused and won't generate payments until is resumed. |
      | `cancelled`  | The subscription have been manually cancelled.                                           |
      | `finished`   | The subscription is completed: all the payments were created succesfully.                |
      | `incomplete` | The subscription is incomplete and waiting for additional information.                   |


      <SchemaDefinition schemaRef="#/components/schemas/subscription" exampleRef="#/components/examples/subscription" showReadOnly={true} showWriteOnly={true} />
  - name: Webhooks
    description: |
      Webhooks are endpoints you can configure to be notified about events that happen in your Debi account. Most users configure Webhooks from the dashboard, which provides a user interface for registering and testing your webhook endpoints.

      <SchemaDefinition schemaRef="#/components/schemas/webhook" exampleRef="#/components/examples/webhook" showReadOnly={true} showWriteOnly={true} />
externalDocs:
  description: Debi Docs.
  url: https://debi.pro/docs
