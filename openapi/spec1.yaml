                  additionalProperties:
                    maxLength: 500
                    type:
                      - string
                      - 'null'
                      - number
                      - boolean
                  properties: {}
              required:
                - features
                - login_page
            example:
              features:
                customer_update: false
                invoice_history: true
                payment_method_update: true
                subscription_cancel: true
              login_page:
                enabled: true
              business_profile:
                headline: Manage your subscription
