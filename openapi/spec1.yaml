    link:
      description: This object represents a public link of your organization.
      type: object
      properties:
        id:
          description: Unique identifier for the object.
          type: string
          readOnly: true
        uuid:
          description: UUID identifier for the object. [Legacy]
          type: string
          example: 43751655-7580-4bd7-8bad-3c54ed1c4abc
        livemode:
          description: Has the value `true` if the object exists in live mode or the value `false` if the object exists in test mode.
          type: boolean
          example: true
        metadata:
          description: |
            Set of [key-value pairs](#section/Metadata) that you can attach
            to an object. This can be useful for storing additional
            information about the object in a structured format.
            All keys can be unset by posting `null` value to `metadata`.
          type:
            - object
            - 'null'
          example:
            some: metadata
          additionalProperties:
            maxLength: 500
            type:
              - string
              - 'null'
              - number
              - boolean
          properties: {}
        extra_fields:
          description: |
            A collection of fields designed to be stored as [the metadata](#section/Metadata) of the object that the Session is generating  whether it's a [Payment](#tag/Payments), [Subscription](#tag/Subscriptions), or [Mandate](#tag/Mandates). This functionality enables you to request extra information from the user during the checkout process, providing a means to store supplementary details about the object in a well-organized format.
          type:
            - array
            - 'null'
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              label:
                type: string
              required:
                type: boolean
              options:
                type: object
                additionalProperties:
                  type: string
          example:
            - name: source
              type: select
              label: Cómo nos conociste?
              options:
                key_1: Opción 1
                key_2: Opción 2
            - name: age
              label: Edad
        extra_fields_customer:
          description: |
            A collection of fields designed to be stored as [the metadata](#section/Metadata) of the [Customer](#tag/Customers) that the Session is generating. This functionality enables you to request extra information from the user during the checkout process, providing a means to store supplementary details about the object in a well-organized format.
          type:
            - array
            - 'null'
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              label:
                type: string
              required:
                type: boolean
              options:
                type: object
                additionalProperties:
                  type: string
          example:
            - name: identification_type
              type: select
              label: Tipo de documento
              options:
                dni: DNI
                cuit: CUIT
                rut: RUT
                cif: CIF
                passport: Pasaporte
            - name: identification_number
              type: text
              label: Número de documento
        created_at:
          description: 'Time at which the object was created. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
          type: string
          format: date-time
          example: 2022-02-11T23:19:22-03:00
        updated_at:
          description: 'Time at which the object was last updated. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
          type: string
          format: date-time
          example: 2022-02-11T23:19:22-03:00
        deleted_at:
          description: 'Time at which the object was deleted. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
          type:
            - 'null'
            - string
          format: date-time
          example: 2022-02-11T23:19:22-03:00
        object:
          type: string
          enum:
            - link
        title:
          description: Title of the payment link
          type: string
          example: Monthly Subscription
        body:
          description: Description body of the payment link
          type: string
          example: Subscribe to our premium service
        button_text:
          description: Text for the payment button
          type: string
          example: Pay Now
        name_text:
          description: Text for the name field
          type: string
          example: Full Name
        success_url:
          description: URL to redirect after successful payment
          type: string
          format: uri
          example: https://example.com/success
        kind:
          description: Type of payment link
          type: string
          example: payment
          enum:
            - payment
            - subscription
            - mandate
        enabled:
          description: Whether the link is enabled
          type: boolean
          example: true
        smart_merge:
          description: Enable smart merge functionality
          type: boolean
          example: false
        binary_mode:
          description: |
            Binary mode forces instantaneous payment processing, returning an immediate and definitive status — either approved or rejected — within the same request response.
            This mode prevents inconclusive responses (such as payments with status `submitted`) by using only gateways that can process payments instantly, ensuring a fast and conclusive outcome.
            It is particularly useful when processing payments in a checkout flow that requires a synchronous response, allowing the customer to receive instant feedback on the transaction result. Also consider that this mode disables automatic retries for rejected payments, but this behavior can be managed also defining the maximum amount of times the payment could be retried automatically by setting the `auto_retries_max_attempts` parameter.
          type: boolean
          example: true
        payment_method_types:
          description: |
            Array of payment method types to allow. If not specified, all available payment methods will be allowed.
          type: array
          items:
            type: string
            enum:
              - card
              - cbu
              - cvu
              - sepa_debit
              - transfer
          example:
            - card
            - cbu
            - cvu
        payment_method_options:
          description: |
            Configuration options for specific payment method types, such as disallowing certain card networks or funding types.
          type: object
          example:
            card:
              disallow:
                funding:
                  - prepaid
                network:
                  - amex
          properties:
            card:
              type: object
              properties:
                disallow:
                  type: object
                  properties:
                    funding:
                      description: Funding types to disallow
                      type: array
                      items:
                        type: string
                        enum:
                          - credit
                          - debit
                          - prepaid
                          - unknown
                      example:
                        - prepaid
                    network:
                      description: Card networks to disallow
                      type: array
                      items:
                        type: string
                        enum:
                          - amex
                          - diners
                          - discover
                          - favacard
                          - jcb
                          - mastercard
                          - naranja
                          - unknown
                          - visa
                      example:
                        - amex
        supported_payment_methods:
          description: Available payment methods based on user's gateway configuration
          type: array
          items:
            type: object
          example: []
          readOnly: true
        options:
          description: Payment options for the link
          type: array
          items:
            type: object
            properties:
              description:
                description: Description of this payment option
                type: string
                example: Standard Payment
              amount:
                description: Amount for this option
                type: number
                example: 100
              editable_amount:
                description: Allow customer to set the amount
                type: boolean
                example: false
          example:
            - description: Premium Plan
              amount: 29.99
              editable_amount: false
        public_uri:
          description: The public URL for this payment link
          type: string
          example: https://debi.pro/link/LKnJZX0DMv2Mzd4Qp6
          readOnly: true
      title: Link
