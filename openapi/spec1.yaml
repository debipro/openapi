  /v1/payment_methods/{id}/attach:
    post:
      operationId: attachPaymentMethodToCustomer
      summary: Attach payment method to customer
      description: |
        Attach a payment method to a customer. This allows the payment method to be used for future payments for this customer.
      parameters:
        - name: id
          in: path
          description: The payment method ID
          required: true
          schema:
            type: string
            example: PMrLnDA9D6oQ
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  description: The customer ID to attach the payment method to
                  type: string
                  example: CSbJrDMEDaW9
                set_default:
                  description: Whether to set this payment method as the customer's default
                  type: boolean
                  example: false
                prefer:
                  description: Whether to add this payment method to the customer's preferred payment methods
                  type: boolean
                  example: false
              required:
                - customer_id
      responses:
        '200':
          description: Payment method attached successfully
          content: {}
        '404':
          description: Payment method or customer not found
          content:
            application/json:
              schema:
                description: Not Found response
                type: object
                properties:
                  message:
                    type: string
                    example: Record not found
                title: Not Found
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                description: Error de Validación
                type: object
                properties:
                  message:
                    type: string
                  errors:
                    type: object
                    additionalProperties:
                      type: array
                      items:
                        type: string
                example:
                  errors:
                    email:
                      - El email es inválido.
                  message: The given data was invalid.
                title: Validation Error
      tags:
        - Payment Methods
  /v1/payment_methods/{id}/detach:
    post:
      operationId: detachPaymentMethodFromCustomer
      summary: Detach payment method from customer
      description: |
        Detach a payment method from a customer. This removes the association between the payment method and the customer.
      parameters:
        - name: id
          in: path
          description: The payment method ID
          required: true
          schema:
            type: string
            example: PMrLnDA9D6oQ
      responses:
        '200':
          description: Payment method detached successfully
          content: {}
        '404':
          description: Payment method not found
          content:
            application/json:
              schema:
                description: Not Found response
                type: object
                properties:
                  message:
                    type: string
                    example: Record not found
                title: Not Found
      tags:
        - Payment Methods
