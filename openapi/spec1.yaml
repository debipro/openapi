      operationId: BillingPortalConfigurationsCreate
      summary: Create a Billing Portal Configuration
      description: |
        Creates a new Billing Portal Configuration. The first configuration created on the account
        automatically becomes the default configuration used when a Billing Portal Session is created
        without an explicit `billing_portal_configuration_id`.
      requestBody:
        required: true
