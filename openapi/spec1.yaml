    first_payment_in_binary_mode:
      description: |
        Forces instantaneous payment processing for the first payment of the subscription. This provides an immediate status of either `approved` or `rejected` within the request response. This setting eliminates automatic retries for failed payments, ensuring a swift and conclusive outcome. When set to `true`, the payment is processed immediately. If it fails, the subscription will remain in state `incomplete` and no automatic retries will be attempted.
      type: boolean
      example: true
    Webhook:
      description: |-
        You can configure [webhook endpoints](https://debi.pro/docs/webhooks/) via the API to be
        notified about events that happen in your Debi account or connected
        accounts.

        Most users configure webhooks from [the dashboard](https://dashboard.debi.pro/webhooks), which provides a user interface for registering and testing your webhook endpoints.
      type: object
      properties:
        id:
          description: Unique identifier for the object.
          type: string
          example: WHA8EJ1DkDnY
          readOnly: true
        object:
          type: string
          enum:
            - webhook
        url:
          description: The URL of the webhook endpoint.
          type: string
          example: https://debi.pro/webhook/200
          maxLength: 5000
        enabled:
          description: Whether the webhook is enabled.
          type: boolean
        enabled_events:
          description: |
            One of: `checkout.session.async_payment_failed`, `checkout.session.async_payment_succeeded`, `checkout.session.completed`, `checkout.session.expired`, `customer.created`, `customer.disabled`, `customer.restored`, `customer.updated`, `gateway.created`, `gateway.disabled`, `gateway.enabled`, `gateway.updated`, `import.processed`, `mandate.created`, `mandate.restored`, `mandate.revoked`, `payment.cancelled`, `payment.created`, `payment.retrying`, `payment.updated`, `payment_method.automatically_updated`, `payment_method.created`, `payment_method.updated`, `refund.approved`, `refund.created`, `refund.failed`, `subscription.automatically_paused`, `subscription.cancelled`, `subscription.created`, `subscription.finished`, `subscription.paused`, `subscription.resumed`, `subscription.updated`, `user.updated_available_brands`.
          type: array
          items:
            type: string
            properties: {}
          example:
            - customer.created
            - customer.updated
            - payment.created
        secret:
          description: The endpoint's secret, used to generate [webhook signatures](https://debi.pro/docs/api/#webhooks-security).
          type: string
          example: Rrdm41mW4x54uUS2A6QnHhm7hXwpuR
          maxLength: 5000
        failed_lately_count:
          type: integer
          format: int32
          example: 0
        success_lately_count:
          type: integer
          format: int32
          example: 0
        livemode:
          description: Has the value `true` if the object exists in live mode or the value `false` if the object exists in test mode.
          type: boolean
          example: true
        created_at:
          description: 'Time at which the object was created. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
          type: string
          format: date-time
          example: 2022-02-11T23:19:22-03:00
        updated_at:
          description: 'Time at which the object was last updated. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
          type: string
          format: date-time
          example: 2022-02-11T23:19:22-03:00
      example:
        created_at: 2022-02-11T23:19:22-03:00
        enabled: true
        enabled_events:
          - '*'
        id: WHq4VzyAzDgB
        livemode: true
        object: webhook
        secret: DmUeH9E9yJ7ax9IYQVm9HpQ3VWvIx0
        updated_at: 2022-02-11T23:19:22-03:00
        url: https://site.com/webhook
      title: Webhook
