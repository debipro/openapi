  /v1/billing_portal/sessions:
    post:
      operationId: BillingPortalSessionsCreate
      summary: Create a Billing Portal Session
      description: |
        Creates a Billing Portal Session for a specific customer. The returned `url` is the URL that
        you should redirect your customer to so they can manage their billing details. If you don't
        specify a `billing_portal_configuration_id`, the account's default configuration is used.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  description: |
                    [Customer ID](#tag/Customers) the portal session belongs to.
                  type: string
                  example: CS3Z25Agp708
                billing_portal_configuration_id:
                  description: |
                    [Billing Portal Configuration ID](#tag/Billing-Portal-Configurations) to use for
                    this session. Defaults to the account's default configuration when omitted.
                  type:
                    - string
                    - 'null'
                  example: BPCqXz3a8YbE
                return_url:
                  description: |
                    URL the customer is redirected to after they finish managing their billing.
                    Overrides the configuration's `default_return_url` for this session.
                  type:
                    - string
                    - 'null'
                  format: uri
                  example: https://example.com/account
              required:
                - customer_id
            example:
              customer_id: CS3Z25Agp708
              billing_portal_configuration_id: BPCqXz3a8YbE
              return_url: https://example.com/account
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    description: |-
                      A Billing Portal Session is a hosted portal page that lets your customers manage their
                      billing details (payment methods, subscriptions, payment history, ...) without leaving your
                      brand. Create a session for a specific customer and redirect them to the returned `url`.
                    type: object
                    properties:
                      id:
                        description: Unique identifier for the Billing Portal Session.
                        type: string
                        example: BPS5Z25Agp708
                        readOnly: true
                      object:
                        type: string
                        enum:
                          - billing_portal.session
                      customer_id:
                        description: |
                          The [Customer ID](#tag/Customers) the portal session belongs to.
                        type: string
                        example: CS3Z25Agp708
                      billing_portal_configuration_id:
                        description: |
                          The [Billing Portal Configuration](#tag/Billing-Portal-Configurations) used by the session.
                          If not provided when creating the session, the account's default configuration is used.
                        type: string
                        example: BPCqXz3a8YbE
                      url:
                        description: |
                          The URL of the hosted billing portal page. Redirect your customer to this URL to let them
                          manage their billing.
                        type: string
                        example: https://billing.debi.pro/p/session/BPS5Z25Agp708
                        readOnly: true
                      return_url:
                        description: |
                          The URL the customer is redirected to after they are done managing their billing. Falls
                          back to `default_return_url` from the configuration when not provided.
                        type:
                          - string
                          - 'null'
                        example: https://example.com/account
                      livemode:
                        description: Has the value `true` if the object exists in live mode or the value `false` if the object exists in test mode.
                        type: boolean
                        example: true
                      created_at:
                        description: 'Time at which the object was created. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
