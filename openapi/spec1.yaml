  /v1/subscriptions/{id}/actions/cancel:
    post:
      operationId: SubscriptionsCancelSubscription
      summary: Cancel a subcription
      description: |
        This action cancels and archive the subscription. Also cancel the payments
        related to it.
      parameters:
        - name: id
          in: path
          description: |
            [Subscription ID](#tag/Subscriptions).
          required: true
          schema:
            type: string
          example: SBmX1MrZ77Mwq3
      responses:
        '201':
          description: Subscription cancelled succesfully
          content:
            application/json:
              schema:
                properties:
                  data:
                    description: This object represents a subscription of your organization.
                    type: object
                    additionalProperties: false
                    properties:
                      id:
                        description: Unique identifier for the Subscription.
                        type: string
                        example: SBmQ6j9NWxblNv
                        readOnly: true
                      object:
                        type: string
                        enum:
                          - subscription
                      amount:
                        description: Subscription amount
                        type: number
                        example: 12.5
                      description:
                        description: Subscription description
                        type: string
                        example: Ajuste por deuda pasada
                      currency:
                        description: Currency for the transacion using [ISO_4217](https://en.wikipedia.org/wiki/ISO_4217) codes. Defaults to account's default.
                        type: string
                        example: ARS
                        enum:
                          - ARS
                          - BRL
                          - CLP
                          - COP
                          - MXN
                          - USB
                          - USD
                      status:
                        description: Subscription Status
                        type: string
                        example: active
                        enum:
                          - active
                          - paused
                          - cancelled
                          - finished
                          - incomplete
                          - incomplete_expired
                      count:
                        description: |
                          The total number of payments that should be taken by this subscription.
                        type:
                          - 'null'
                          - number
                        example: 12
                      start_date:
                        description: A future date on which the first payment of the subscription should be collected.
                        type: string
                        example: 2022-08-04
                      interval_unit:
                        description: The unit of time between customer charge dates.
                        type: string
                        example: monthly
                        enum:
                          - weekly
                          - monthly
                          - yearly
                      interval:
                        description: Number of `interval_units` between customer charge dates. Must be greater than to 1. If `interval_units` is `weekly` and interval is 2, then the customer will be charged every two weeks. Defaults to 1.
                        type: number
                        example: 1
                      day_of_month:
                        description: Day of month, from 1 to 31, or -1 for the last day of the month. This field is required if `interval_unit` is set to monthly. Defaults to 1. If the chosen day doesn't exist in a given month (e.g. 30 or 31 in February), the payment is charged on the last day of that month.
                        type: number
                      day_of_week:
                        description: Day of week number, from 0 (Sunday) to 6 (Saturday). This field is required if `interval_unit` is set to `weekly`.
                        type:
                          - 'null'
                          - number
                      livemode:
                        description: Has the value `true` if the object exists in live mode or the value `false` if the object exists in test mode.
                        type: boolean
                        example: true
                      created_at:
                        description: 'Time at which the object was created. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
                        type: string
                        format: date-time
                        example: 2022-02-11T23:19:22-03:00
                      updated_at:
                        description: 'Time at which the object was last updated. Formatting follows [RFC339](https://datatracker.ietf.org/doc/html/rfc3339#section-5.8). Example: `2015-10-21T08:29:31-03:00`.'
                        type: string
                        format: date-time
                        example: 2022-02-11T23:19:22-03:00
                      auto_retries_max_attempts:
                        description: The maximum number of times the payments from this subscription could be automatically retried.
                        type:
                          - 'null'
                          - number
                        example: null
                      first_date:
                        description: The date on which the first payment should be charged. When left blank and month or day_of_month are provided, this will be set to the date of the first payment. If created without month or day_of_month this will be set as soon as possible.
                        type: string
                        example: 2022-08-04
