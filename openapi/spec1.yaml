  /v1/mandates/{id}/actions/revoke:
    post:
      operationId: MandatesRevokeMandate
      summary: Revoke a mandate
      description: This action will revoke the mandate and also cancel all the cancellable subscriptions attached to the same `customer` and `payment method`.
      parameters:
        - name: id
          in: path
          description: |
            [Mandate ID](#tag/Mandates).
          required: true
          schema:
            type: string
          example: MA9aQOWen2kZe6qypB
      responses:
        '202':
          description: Mandate revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  data:
                    description: Unauthorized response
                    type: object
                    properties:
                      message:
                        type: string
                        example: Unauthorized
                    title: Unauthorized
      tags:
        - Mandates
  /v1/mandates/{id}/actions/restore:
    post:
      operationId: MandatesRestoreMandate
      summary: Restore mandate
      description: This action will restore the revoked mandate.
      parameters:
        - name: id
          in: path
          description: |
            [Mandate ID](#tag/Mandates).
          required: true
          schema:
            type: string
          example: MA9aQOWen2kZe6qypB
      responses:
        '202':
          description: Mandate restored
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                properties:
                  data:
                    description: Unauthorized response
                    type: object
                    properties:
                      message:
                        type: string
                        example: Unauthorized
                    title: Unauthorized
      tags:
        - Mandates
