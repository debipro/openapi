          in: query
          description: Show only payment methods from a given subscription.
          required: false
          schema:
            type: string
          example: SBmX1MrZ77Mwq3
        - name: created_at
          in: query
          description: A filter on the list, based on the object `created_at` field. The value can be a string with an integer Unix timestamp, or it can be a dictionary with a number of different query options.
          required: false
          schema:
            type: object
            properties:
              gt:
                description: Minimum value to filter by (exclusive)
                type: integer
              gte:
                description: Minimum value to filter by (inclusive)
                type: integer
              lt:
                description: Maximum value to filter by (exclusive)
                type: integer
              lte:
                description: Maximum value to filter by (inclusive)
                type: integer
            title: range_query_specs
          explode: true
