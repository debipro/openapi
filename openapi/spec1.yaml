  /v1/sessions:
    post:
      operationId: SessionsCreateSession
      summary: Create a sesssion
      description: Create a session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                kind:
                  description: One of payment, subscription or mandate.
                  type: string
                  enum:
                    - payment
                    - subscription
                    - mandate
                success_url:
                  description: The uri on which your customer will be redirected after completing the checkout.
                  type: string
                amount:
                  description: The amount of the payment or subscription.
                  type: string
                description:
                  description: The title of the payment or subscription.
                  type: string
                customer_id:
                  description: |
                    [Customer ID](#tag/Customers).
                  type: string
                  example: CSgaZlLaPMZO
                customer_name:
                  description: |
                    Name of your customer. You can fill it or ask the customer to fill this field in the checkout process.
                  type: string
                customer_email:
                  description: |
                    Email of your customer. You can fill it or ask the customer to fill this field in the checkout process.
                  type: string
                customer_gateway_identifier:
                  description: The customer's reference for bank account statements.
                  type:
                    - 'null'
                    - string
                  example: '383473'
                editable_amount:
                  description: |
                    Allow the customer to set the amount, useful for donations.
                  type: boolean
                installments:
                  description: |
                    Only for payments, quantity of payments on which the amount will be splitted.
                  type: integer
                max_installments:
                  description: |
                    Only for payments, allow the customer to choose how many installments can split the payment.
                  type: integer
                interval_unit:
                  description: |
                    Only for subscriptions, the unit of time between customer charge dates. One of weekly, monthly or yearly.
                  type: string
                  enum:
                    - weekly
                    - monthly
                    - yearly
                interval:
                  description: |
                    Only for subscriptions, the number of interval_units between customer charge dates. Must be greater than to 1. If interval_unit is weekly and interval is 2, then the customer will be charged every two weeks. Defaults to 1.
                  type: integer
                day_of_month:
                  description: |
                    Only for subscriptions, the day of month, from 1 to 31, or -1 for the last day of the month. If the chosen day doesn't exist in a given month (e.g. 30 or 31 in February), the payment is charged on the last day of that month. Use only if you need the subscription to start in a specyfic date. In most cases this should be null, therefore Debi will use the date of the moment when the user completes the checkout.
                  type: integer
                day_of_week:
                  description: |
                    Only for subscriptions, the day of week number, from 0 (Sunday) to 6 (Saturday). Use only if you need the subscription to start in a specyfic date. In most cases this should be null, therefore Debi will use the date of the moment when the user completes the checkout.
                  type: integer
                binary_mode:
                  description: |
