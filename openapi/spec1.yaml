              type: object
              properties:
                features:
                  description: |
                    Toggle each feature available in the portal. All four flags are required.
                  type: object
                  properties:
                    customer_update:
                      description: Allow the customer to update their personal information.
                      type: boolean
                    invoice_history:
                      description: Allow the customer to view their payment history.
                      type: boolean
                    payment_method_update:
                      description: Allow the customer to manage their payment methods.
                      type: boolean
                    subscription_cancel:
                      description: Allow the customer to cancel their subscriptions.
                      type: boolean
                  required:
                    - customer_update
                    - invoice_history
                    - payment_method_update
                    - subscription_cancel
                login_page:
                  description: Configuration of the standalone login page.
                  type: object
                  properties:
                    enabled:
                      description: Enables the public login page for the configuration.
                      type: boolean
                  required:
                    - enabled
                business_profile:
                  description: Business information shown to the customer in the portal.
                  type: object
                  properties:
                    headline:
                      description: A short headline displayed at the top of the portal.
                      type: string
                    privacy_policy_url:
                      description: URL to your privacy policy.
                      type: string
                    terms_of_service_url:
                      description: URL to your terms of service.
                      type: string
                default_return_url:
                  description: |
                    Default URL the customer is redirected to after they are done managing their
                    billing.
                  type:
                    - string
                    - 'null'
                payment_method_types:
                  description: |
                    Array of payment method types to allow. If not specified, all available payment methods will be allowed.
                  type: array
                  items:
                    type: string
                    enum:
                      - card
                      - cbu
                      - cvu
                      - sepa_debit
                      - transfer
                  example:
                    - card
                    - cbu
                    - cvu
                payment_method_options:
                  description: |
                    Configuration options for specific payment method types, such as disallowing certain card networks or funding types.
                  type: object
                  example:
                    card:
                      disallow:
                        funding:
                          - prepaid
                        network:
                          - amex
                  properties:
                    card:
                      type: object
                      properties:
                        disallow:
                          type: object
                          properties:
                            funding:
                              description: Funding types to disallow
                              type: array
                              items:
                                type: string
                                enum:
                                  - credit
                                  - debit
                                  - prepaid
                                  - unknown
                              example:
                                - prepaid
                            network:
                              description: Card networks to disallow
                              type: array
                              items:
                                type: string
                                enum:
                                  - amex
                                  - diners
                                  - discover
                                  - favacard
                                  - jcb
                                  - mastercard
                                  - naranja
                                  - unknown
                                  - visa
                              example:
                                - amex
                metadata:
